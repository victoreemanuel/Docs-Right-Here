<div class="SobreposiçãoJanela">
  <div class="CartãoFlutuante" style="display: flex; flex-direction: column; border-radius: 20px; padding: auto;">
    <div class="ExcluidoDados" style="display: flex; align-items: center; gap: 15px; justify-content:center; margin-bottom: 30px;">
      <i class="bi bi-trash3" style="font-size: 40px;"></i>
      <h2 class="m-0" style="font-size: 40px;">Cards Excluídos</h2>
    </div>

    <div style="max-height: 400px; overflow-y: auto; width: 100%; padding-right: 10px;">
      <div class="row g-3">
        @for (cardDel of cardsExcluidos; track cardDel) {
        <div class="col-md-6">
          <div class="d-flex gap-3 align-items-start p-3 rounded-4" style="background-color: #2c3034; color: white;">
            <div class="rounded-3 d-flex align-items-center justify-content-center" [style.background-color]="cardDel.cor || '#7b2cbf'" style="width: 45px; height: 45px; min-width: 45px;">
              <i [class]="'bi ' + (cardDel.icone || 'bi-file-earmark-text') + ' fs-4'"></i>
            </div>
            <div class="d-flex flex-column flex-grow-1">
              <h4 class="m-0 fw-bold" style="font-size: 16px; line-height: 1.2;">{{ cardDel.titulo }}</h4>
              <p class="m-0 text-white-50 mt-1" style="font-size: 13px;">{{ cardDel.descricao }}</p>
              <div class="d-flex justify-content-end gap-2 mt-3">
                <button (click)="deletarPermanente(cardDel)" class="btn btn-sm text-white px-3" style="background-color: #5a6268; border-radius: 8px; font-size: 13px; font-weight: 500;">Excluir</button>
                <button (click)="recuperarCard(cardDel)" class="btn btn-sm text-white px-3" style="background-color: #5a6268; border-radius: 8px; font-size: 13px; font-weight: 500;">Recuperar</button>
              </div>
            </div>
          </div>
        </div>
        } @empty {
        <div class="col-12 d-flex flex-column align-items-center justify-content-center text-center text-white-50 py-5">
          <i class="bi bi-trash-visible mb-2" style="font-size: 55px; color: #ced4da;"></i>
          <p class="m-0 fs-5 fw-semibold">Sua lixeira está vazia.</p>
        </div>
        }
      </div>
    </div>

    <div class="d-flex justify-content-end gap-3" style="margin-top: auto;">
      <button (click)="exibirJanelaExcluir = false" class="btn rounded-pill px-4 py-2 text-white" style="background-color: #2c3034; font-weight: bold;">Fechar</button>
    </div>
  </div>
</div>
