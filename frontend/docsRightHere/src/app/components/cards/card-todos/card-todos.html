<div class="SobreposiçãoJanela">
  <div class="CartãoFlutuante" style="display: flex; flex-direction: column;">
    <div class="CriaçãoDados" style="display: flex; align-items: center; gap: 15px; justify-content:center;">
      <h2 class="m-0" style="font-size: 40px;">Todos os Cards</h2>
    </div>

    <div style="max-height: 400px; overflow-y: auto; width: 100%; padding-right: 10px; margin-top: 30px; margin-bottom: 15px;">
      <div class="row g-3">
        @for (Card of meusCards; track Card; let i = $index) {
        <div class="col-md-6">
          <div class="d-flex flex-column justify-content-between p-3 rounded-4" style="background-color: #2c3034; min-height: 140px; color: white;">
            <div class="d-flex gap-3 align-items-start">
              <div class="rounded-3 d-flex align-items-center justify-content-center" [style.background-color]="Card.cor || '#7b2cbf'" style="width: 45px; height: 45px; min-width: 45px;">
                <i [class]="'bi ' + (Card.icone || 'bi-file-earmark-text') + ' fs-4'"></i>
              </div>
              <div class="d-flex flex-column">
                <h4 class="m-0 fw-bold" style="font-size: 16px; line-height: 1.2;">{{ Card.titulo }}</h4>
                <p class="m-0 text-white-50 mt-1" style="font-size: 13px;">{{ Card.descricao }}</p>
              </div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-3">
              <button (click)="excluirCard(Card)" class="btn btn-sm text-white px-3" style="background-color: #5a6268; border-radius: 8px; font-size: 12px;">Excluir</button>
              <button (click)="abrirCard(Card); exibirJanelaAcessar = false" class="btn btn-sm text-white px-3" style="background-color: #5a6268; border-radius: 8px; font-size: 12px;">Abrir</button>
            </div>
          </div>
        </div>
        } @empty {
        <div class="col-12 d-flex flex-column align-items-center justify-content-center text-center text-white-50 py-5">
          <i class="bi bi-folder-x mb-2" style="font-size: 55px; color: #ced4da;"></i>
          <p class="m-0 fs-5 fw-semibold">Nenhum card cadastrado no sistema.</p>
        </div>
        }
      </div>
    </div>

    <div class="d-flex justify-content-end gap-3" style="margin-top: auto;">
      <button (click)="exibirJanelaAcessar = false" class="btn btn-modal">Fechar</button>
    </div>
  </div>
</div>
