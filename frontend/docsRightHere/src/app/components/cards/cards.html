<div class="container-fluid">

  <div class="row g-3">
    <div class="col-12">
      <div class="TopoPagina d-flex gap-2 ">

        <div class="pessoa px-4"
          style="display: flex; gap: 10px; height: 60px; background: linear-gradient(to right, #2b76b9, #09d37f); justify-content: center; align-items: center; color: white; font-size: 35px;">
          <i class="bi bi-person-circle" style="display: flex; justify-content: center; align-items: center;"></i>
          Laura Silva
        </div>

        <div class="professor px-4"
          style="display: flex; height: 60px; background: linear-gradient(to right, #2b76b9, #09d37f); justify-content: center; align-items: center; color: white; font-size: 35px;">
          Professor(a)
        </div>

      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-11 mt-4">
      <div class="CebeçaSegundariaPagina mb-0 d-flex justify-content-between mt-3">

        <div class="ms-3 d-flex fw-bold text-black align-items-start" style="font-size: 45px; font-weight: bold; ">Meus Cards</div>

        <div class="ExcluirCard justify-content-center">
          <button class="btn bi bi-trash text-white mt-5 gap-2 align-items-center d-flex rounded-4"
            type="submit" style="background-color: #3a3f44; height: 65px; font-size: 20px; margin-top: 30px;">
            Cards Excluídos
          </button>
        </div>

      </div>
    </div>
  </div>

  <div class="LinhaPrincipal row mb-5 g-4 justify-content-center text-wrap" style="margin-top: -15px;">
    <div class="col-md-5">
      <button (click)="abrirJanela()" class="btn text-white gap-2 mb-2 fw-bold w-100 h-100 text-wrap"
        style=" background-color:#3a3f44; border-radius: 15px; justify-content: center; align-items: center; display: flex; color: white; font-size: 100px;">
        +
      </button>
    </div>

    <div class="col-md-5">
      <button class="btn text-white gap-2 mb-2 fw-bold w-100 h-100 text-wrap"
        style="background-color:#3a3f44; border-radius: 15px; justify-content: center; align-items: center; display: flex; color: white; font-size: 35px;">
        Acessar todos Cards
      </button>
    </div>
  </div>

  <div class="JanelaCriarCards">
  @if (exibirJanela){
    <div class="row justify-content-center">
      <div class="col-10">
        <h2>Minha Janela Flutuante</h2>
      <p>Aqui você coloca o texto ou formulário que precisar.</p>
      
      <button (click)="exibirJanela = false" class="btn btn-danger">Fechar</button>
      </div>
    </div>
  }
  </div>

</div>
