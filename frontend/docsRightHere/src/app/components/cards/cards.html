<div class="container-fluid" style="position: relative; min-height: calc(100vh - 90px);">
  <div class="row g-3">
    <div class="col-12">
      <div class="TopoPagina d-flex gap-2 ">
        <div class="pessoa px-4"
          style="display: flex; gap: 10px; height: 60px; background: linear-gradient(to right, #2b76b9, #09d37f); justify-content: center; align-items: center; color: white; font-size: 35px;">
          <i class="bi bi-person-circle" style="display: flex; justify-content: center; align-items: center;"></i>
          Laura Silva
        </div>
        <div class="professor px-4"
          style="display: flex; height: 60px; background: linear-gradient(to right, #2b76b9, #09d37f); justify-content: center; align-items: center; color: white; font-size: 35px;">
          Professor(a)
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-11 mt-4">
      <div class="CebeçaSegundariaPagina mb-0 d-flex justify-content-between mt-3">
        <div class="ms-3 d-flex fw-bold text-black align-items-start" style="font-size: 45px; font-weight: bold; ">
          Meus Cards
        </div>
        <div class="ExcluirCard justify-content-center">
          <button (click)="abrirJanelaExcluir()"
            class="btn bi bi-trash text-white mt-5 gap-2 align-items-center d-flex rounded-4" type="submit"
            style="background-color: #3a3f44; height: 65px; font-size: 20px; margin-top: 30px;">
            Cards Excluídos
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="LinhaPrincipal row g-4 justify-content-center text-wrap" style="margin-top: -15px;">
    <div class="col-md-5">
      <button (click)="abrirJanelaCriar()" class="btn text-white gap-2 mb-2 fw-bold w-100 h-100 text-wrap"
        style=" background-color:#3a3f44; border-radius: 15px; justify-content: center; align-items: center; display: flex; color: white; font-size: 100px;">
        +
      </button>
    </div>

    <div class="col-md-5">
      <button (click)="abrirJanelaAcessar()" class="btn text-white gap-2 mb-2 fw-bold w-100 h-100 text-wrap"
        style="background-color:#3a3f44; border-radius: 15px; justify-content: center; align-items: center; display: flex; color: white; font-size: 35px;">
        Acessar todos Cards
      </button>
    </div>
  </div>

  <div class="row g-4 justify-content-center mt-2">
    <div class="col-md-10">
      <div class="row g-4">
        @for (Card of cardsRecentes; track Card; let i = $index) {
        <div class="col-md-6">
          <div class="d-flex flex-column justify-content-between"
            style="background-color: #3a3f44; min-height: 150px; border-radius: 15px; color: white; padding: 20px;">
            <div class="d-flex gap-3 align-items-start">
              <div class="rounded-3 d-flex align-items-center justify-content-center"
                [style.background-color]="Card.cor || '#7b2cbf'" style="width: 45px; height: 45px; min-width: 45px;">
                <i [class]="'bi ' + (Card.icone || 'bi-file-earmark-text') + ' fs-4'"></i>
              </div>
              <div class="d-flex flex-column">
                <h3 class="fw-bold m-0" style="font-size: 20px; line-height: 1.2;">{{ Card.titulo }}</h3>
                <p class="mt-2 mb-0" style="font-size: 15px; color: #ced4da;">{{ Card.descricao }}</p>
              </div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-2">
              <button (click)="excluirCard(Card)" class="btn btn-sm text-white px-3"
                style="background-color: #5a6268; border-radius: 8px;">Excluir</button>
              <button (click)="abrirCard(Card)" class="btn btn-sm text-white px-3"
                style="background-color: #5a6268; border-radius: 8px;">Abrir</button>
            </div>
          </div>
        </div>
        }
      </div>

      <div class="JanelaCriarCards">
        @if (exibirJanelaCriar) {
          <app-card-criar
            [iconesDisponiveis]="iconesDisponiveis" [coresDisponiveis]="coresDisponiveis"
            [(novoTitulo)]="novoTitulo" [(novaDescricao)]="novaDescricao"
            [(iconeSelecionado)]="iconeSelecionado" [(corSelecionada)]="corSelecionada"
            [(exibirJanelaCriar)]="exibirJanelaCriar" (onCriar)="criarNovoCard()">
          </app-card-criar>
        }
      </div>

      <div class="JanelaAcessarCards">
        @if (exibirJanelaAcessar){
          <app-card-todos
            [meusCards]="meusCards" [(exibirJanelaAcessar)]="exibirJanelaAcessar"
            (onExcluir)="excluirCard($event)" (onAbrir)="abrirCard($event)">
          </app-card-todos>
        }
      </div>

      <div class="JanelaExcluirCards">
        @if (exibirJanelaExcluir){
          <app-card-lixeira
            [cardsExcluidos]="cardsExcluidos" [(exibirJanelaExcluir)]="exibirJanelaExcluir"
            (onDeletar)="deletarPermanente($event)" (onRecuperar)="recuperarCard($event)">
          </app-card-lixeira>
        }
      </div>

      <div class="JanelaDoCardAberto">
        @if (exibirJanelaCards){
          <app-card-abrir
            [cardSelecionado]="cardSelecionado" [arquivosFiltrados]="arquivosFiltrados"
            [(modoEdicao)]="modoEdicao" [(tituloEdicao)]="tituloEdicao" [(descricaoEdicao)]="descricaoEdicao"
            [(termoBuscaArquivo)]="termoBuscaArquivo" [(exibirFiltros)]="exibirFiltros" [(filtroTipoSelecionado)]="filtroTipoSelecionado"
            [(exibirJanelaCards)]="exibirJanelaCards"
            (onBaixar)="baixarArquivo($event)" (onVer)="verArquivo($event)"
            (onExcluirArq)="excluirArquivo($event)" (onAnexar)="anexarArquivo($event)" (onAlternarEdicao)="alternarEdicao()">
          </app-card-abrir>
        }
      </div>

    </div>
  </div>
</div>
