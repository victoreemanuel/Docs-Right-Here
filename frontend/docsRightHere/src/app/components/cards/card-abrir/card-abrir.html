<div class="SobreposiçãoJanela">
  <div class="CartãoFlutuante d-flex flex-column" style="width: 75%; background-color: #3c4856; border-radius: 20px; padding: 25px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="d-flex gap-3 align-items-center">
        <div class="rounded-3 d-flex align-items-center justify-content-center" [style.background-color]="cardSelecionado?.cor || '#7b2cbf'" style="width: 45px; height: 45px;">
          <i [class]="'bi ' + (cardSelecionado?.icone || 'bi-file-earmark-text') + ' fs-4 text-white'"></i>
        </div>
        <div>
          @if (!modoEdicao) {
          <h2 class="m-0 fw-bold text-white" style="font-size: 22px;">{{ cardSelecionado?.titulo }}</h2>
          <p class="m-0 text-white-50" style="font-size: 15px;">{{ cardSelecionado?.descricao }}</p>
          } @else {
          <input type="text" [(ngModel)]="tituloEdicao" class="form-control form-control-sm text-white border-0 mb-1" style="background-color: #212529; font-size: 18px; font-weight: bold; border-radius: 8px;">
          <input type="text" [(ngModel)]="descricaoEdicao" class="form-control form-control-sm text-white-50 border-0" style="background-color: #212529; font-size: 13px; border-radius: 8px;">
          }
        </div>
      </div>

      <div class="d-flex gap-2 position-relative">
        <style>
          .caixa-busca::placeholder { color: #a0a5a8 !important; opacity: 1; }
        </style>
        <div class="d-flex gap-2 position-relative">
          <div class="position-relative">
            <input type="text" placeholder="Buscar..." [(ngModel)]="termoBuscaArquivo" class="form-control text-white border-0 px-3 py-2 rounded-3" style="background-color: #212529; width: 200px; font-size: 14px;">
          </div>
          <button (click)="exibirFiltros = !exibirFiltros" class="btn text-white border border-secondary rounded-3 d-flex align-items-center gap-1" style="font-size: 14px; background-color: transparent;">
            <i class="bi bi-funnel"></i> Filtros
          </button>

          @if (exibirFiltros) {
          <div class="position-absolute end-0 p-3 rounded-4 shadow-lg text-white" style="background-color: #343a40; border: 1px solid #5a6268; width: 240px; top: 45px; z-index: 1050;">
            <h3 class="fw-bold mb-3 d-flex align-items-center gap-2" style="font-size: 20px;"><i class="bi bi-funnel"></i> Filtros</h3>
            <div class="d-flex flex-column gap-3 mb-4" style="font-size: 15px;">
              <label class="d-flex align-items-center gap-3 cursor-pointer"><input type="radio" name="tipoFiltro" (change)="filtroTipoSelecionado = 'PDF'" [checked]="filtroTipoSelecionado === 'PDF'" style="transform: scale(1.2);"> PDF</label>
              <label class="d-flex align-items-center gap-3 cursor-pointer"><input type="radio" name="tipoFiltro" (change)="filtroTipoSelecionado = 'WORD'" [checked]="filtroTipoSelecionado === 'WORD'" style="transform: scale(1.2);"> WORD</label>
              <label class="d-flex align-items-center gap-3 cursor-pointer"><input type="radio" name="tipoFiltro" (change)="filtroTipoSelecionado = 'EXCEL'" [checked]="filtroTipoSelecionado === 'EXCEL'" style="transform: scale(1.2);"> EXCEL</label>
              <label class="d-flex align-items-center gap-3 cursor-pointer"><input type="radio" name="tipoFiltro" (change)="filtroTipoSelecionado = 'POWERPOINT'" [checked]="filtroTipoSelecionado === 'POWERPOINT'" style="transform: scale(1.2);"> POWERPOINT</label>
              <label class="d-flex align-items-center gap-3 cursor-pointer"><input type="radio" name="tipoFiltro" (change)="filtroTipoSelecionado = 'TODOS'" [checked]="filtroTipoSelecionado === 'TODOS'" style="transform: scale(1.2);"> TODOS ARQUIVOS</label>
            </div>
            <div class="d-flex justify-content-end gap-2">
              <button (click)="exibirFiltros = false" class="btn btn-sm text-white px-3 py-1 rounded-pill" style="background-color: #212529; font-size: 13px; font-weight: bold;">Cancelar</button>
              <button (click)="exibirFiltros = false" class="btn btn-sm text-white px-3 py-1 rounded-pill" style="background-color: #212529; font-size: 13px; font-weight: bold;">Filtrar</button>
            </div>
          </div>
          }
        </div>
      </div>
    </div>

    <div style="max-height: 280px; overflow-y: auto; padding-right: 8px;">
      @for (arquivo of arquivosFiltrados; track arquivo; let arq = $index) {
      <div class="d-flex justify-content-between align-items-center p-3 mb-3 rounded-4" style="background-color: #2c3034;">
        <div class="d-flex gap-3 align-items-center">
          <div class="rounded-3 d-flex align-items-center justify-content-center" style="background-color: #0284c7; width: 35px; height: 35px;">
            <i class="bi bi-file-earmark-text text-white"></i>
          </div>
          <span class="text-white fw-semibold">{{ arquivo.nome }}</span>
        </div>
        <div class="d-flex gap-4 align-items-center text-white-50">
          <span class="badge bg-dark text-white rounded-2 px-2 py-1" style="font-size: 11px;">{{ arquivo.tipo }}</span>
          <button class="btn p-0 border-0 bg-transparent text-white" (click)="baixarArquivo(arquivo)"><i class="bi bi-download"></i></button>
          <button class="btn p-0 border-0 bg-transparent text-white fw-bold" style="font-size: 14px;" (click)="verArquivo(arquivo)">Ver</button>
          <button class="btn p-0 border-0 bg-transparent text-white" (click)="excluirArquivo(arq)"><i class="bi bi-trash"></i></button>
        </div>
      </div>
      } @empty {
      <div class="text-center text-white-50 my-5 py-3">
        <i class="bi bi-folder-x fs-1 d-block mb-2" style="color: #ced4da;"></i>
        <p class="m-0 fs-6">Nenhum arquivo anexado a este card ainda.</p>
      </div>
      }
    </div>

    <div class="d-flex justify-content-between align-items-center mt-auto">
      <input type="file" #janelaArquivos style="display: none;" (change)="anexarArquivo($event)">
      <button (click)="janelaArquivos.click()" class="btn text-white rounded-pill px-4 py-2 d-flex align-items-center gap-2" style="background-color: #2c3034; font-weight: bold;">
        <i class="bi bi-paperclip"></i> Anexar
      </button>
      <div class="d-flex gap-2">
        <button (click)="alternarEdicao()" class="btn rounded-pill px-4 py-2 text-white" style="background-color: #2c3034; font-weight: bold;">{{ modoEdicao ? 'Salvar' : 'Editar' }}</button>
        <button (click)="exibirJanelaCards = false" class="btn rounded-pill px-4 py-2 text-white" style="background-color: #2c3034; font-weight: bold;">Fechar</button>
      </div>
    </div>
  </div>
</div>
