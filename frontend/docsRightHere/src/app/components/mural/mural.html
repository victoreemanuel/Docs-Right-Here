<div class="mural-wrapper">
  
  <div class="row g-3 mb-4 mt-2 px-4 mx-0">
    <div class="col-12">
      <div class="TopoPagina d-flex gap-2">
        <div class="pessoa px-4 shadow-sm rounded-3"
             style="display: flex; gap: 10px; height: 60px; background: linear-gradient(to right, #2b76b9, #09d37f); justify-content: center; align-items: center; color: white; font-size: 1.5rem; font-weight: 500;">
          <i class="bi bi-person-circle"></i>
          {{ usuarioLogado.nome }}
        </div>

        <div class="professor px-4 shadow-sm rounded-3"
             style="display: flex; height: 60px; background: linear-gradient(to right, #2b76b9, #09d37f); justify-content: center; align-items: center; color: white; font-size: 1.5rem; font-weight: 500;">
          Professor(a)
        </div>
      </div>
    </div>
  </div>

  <section class="d-flex justify-content-between align-items-center mb-3 px-4">
    <h2 class="fw-bold m-0 titulo-mural">Mural de Avisos</h2>
    <div class="d-flex gap-2 align-items-center">
      <span class="badge-filter prof c-pointer" (click)="filtrar('professor')">Professor</span>
      <span class="badge-filter sec c-pointer" (click)="filtrar('secretaria')">Secretaria</span>
      <span class="badge-filter dir c-pointer" (click)="filtrar('diretor')">Diretor</span>
      <button class="btn btn-light btn-sm border px-3 shadow-sm" (click)="filtrar('todos')">
        <i class="bi bi-filter"></i> Todos
      </button>
    </div>
  </section>

  <div class="grid-layout-scroll flex-grow-1 px-4">
    @for (item of avisosExibidos; track item.id) {
      <article class="card-aviso shadow-sm">
        <div class="card-header w-100 d-flex justify-content-between align-items-start">
          <div class="d-flex gap-2">
            <i class="bi bi-circle-fill"
               [ngClass]="{
                 'dot-prof': item.cargo === 'professor',
                 'dot-sec': item.cargo === 'secretaria',
                 'dot-dir': item.cargo === 'diretor'
               }"></i>
            <div class="info">
              <h6>{{ item.titulo }}</h6>
              <small>por {{ item.criador }}</small>
            </div>
          </div>
          <i class="bi bi-trash-fill icone-lixeira" (click)="excluirAviso(item)"></i>
        </div>
        <div class="card-body-text">
          <p>{{ item.descricao }}</p>
          <p>{{ item.data }}</p>
        </div>
        <div class="card-footer-icons">
          <i class="bi bi-check-all c-pointer"
             [ngClass]="item.visualizado ? 'check-ativado' : 'check-desativado'"
             (click)="marcarComoVisualizado(item)"></i>
        </div>
      </article>
    } @empty {
      <div class="w-100 text-center mt-5 text-muted">
        Nenhum aviso encontrado para este filtro.
      </div>
    }
  </div>

  <footer class="footer-actions mt-4 pt-3 pb-4 px-4 border-top w-100">
    <button class="btn-custom shadow-sm" (click)="abrirHistorico()">Histórico</button>
    <button class="btn-custom shadow-sm" (click)="abrirNovoAviso()">Novo aviso</button>
  </footer>
</div>
