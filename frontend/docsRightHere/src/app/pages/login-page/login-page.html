<div class="container-fluid">
  <div class="row vh-100">
    <div class="col-6 p-0 text-bg-dark">

      <app-template-lateral-login></app-template-lateral-login>

    </div>
    <div class="col-6 background-dark">
      <div class="d-flex align-items-center justify-content-evenly flex-column h-100">
        <div class="background-gray h-50 w-75 rounded-2 text-white d-flex flex-column align-items-center">

          <div class="mt-4 d-flex flex-column align-items-center">
            <p class="text-gradient fs-2 fw-bold m-0">Bem-Vindo de volta</p>
            <p class="fs-6">Acesse sua conta para continuar</p>
          </div>
          <div class="m-3">
            <p class="m-0">email</p>
            <input type="text" placeholder="seulogin@gmaill.com" [(ngModel)]="email">
            <p class="m-0">senha</p>
            <input type="password" placeholder="*********" [(ngModel)]="password">
          </div>
          <button class="w-50 btn btn-dark btn-background" (click)="realizarlogin()">Entrar</button>

        </div>
      </div>
    </div>
  </div>
</div>
