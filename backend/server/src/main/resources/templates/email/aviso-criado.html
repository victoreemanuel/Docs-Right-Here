<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">

<div style="max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden;">

    <div style="
    background: linear-gradient(180deg,#2a80b5 0%, #15bf92 100%);
    padding: 20px; 
    text-align: center;
    ">
        <img src="cid:logoAviso" alt="Logo" style="max-width: 80px; display: block; margin: 0 auto;">
        <h1 style="color: #ffffff; margin: 0;">Novo Aviso</h1>
    </div>

    <div style="padding: 24px;">
        <h2 th:text="${titulo}" style="color: #2c3e50;">Título do aviso</h2>

        <p style="color: #555;">
            <strong>Criado por:</strong>
            <span th:text="${criadoPor}">Nome do autor</span>
        </p>

        <p style="color: #333; line-height: 1.5;" th:text="${descricao}">
            Descrição do aviso aqui.
        </p>
    </div>

    <div style="background-color: #f0f0f0; padding: 12px; text-align: center; font-size: 12px; color: #999;">
        Este é um e-mail automático, por favor não responda.
    </div>

</div>

</body>
</html>
