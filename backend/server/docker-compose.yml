version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: drh_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: admin
      MYSQL_PASSWORD: '123'
    ports:
      - '3307:3306'
    volumes:
      - drh_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: drh_java_server
    restart: always
    ports:
      - '8080:8080'
    environment:
      - MYSQL_URL=jdbc:mysql://db:3306/mydb
      - MYSQLUSER=admin
      - MYSQLPASSWORD=123
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  drh_db_data: